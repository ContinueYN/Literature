# 免费 GitHub Actions 安卓构建（自动产出 debug APK）
# 触发：push 到 main，或手动在 Actions 页点 Run workflow
# 在 ubuntu 免费 runner 上编译，无需签名，产物在 Artifacts 下载。
# iOS 安装包因需 Apple 付费开发者签名，不在此自动构建；
#   如需 iOS，请改用仓库内的 codemagic.yaml（需 Codemagic 付费套餐 + Apple 账号）。

name: Build Android APK

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 安装前端依赖
        run: npm install
      - name: 构建网页资源（生成 dist）
        run: npm run build
      - name: 同步 Web 资源到原生工程
        run: npx cap sync android
      - name: 构建 debug APK（无需签名）
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/**/*.apk
